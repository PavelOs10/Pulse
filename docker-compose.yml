version: '3.8'

services:
  pulse:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-super-secret-change-me-in-production}
    volumes:
      - pulse_data:/app/server/uploads
      - pulse_db:/app/server
    restart: unless-stopped

volumes:
  pulse_data:
  pulse_db:
