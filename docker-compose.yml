version: '3.8'

services:
  pulse:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # ВАЖНО: задайте фиксированный секрет! Иначе после пересборки токены станут невалидны.
      - JWT_SECRET=${JWT_SECRET:-pulse-production-secret-change-me-12345}
      - DATA_DIR=/app/data
    volumes:
      # Единый том для БД + загрузок. Данные сохранятся при пересборке контейнера.
      - pulse_data:/app/data
    restart: unless-stopped

volumes:
  pulse_data:
