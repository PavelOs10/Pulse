name: Deploy Pulse Messenger

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: pulse-messenger
  APP_DIR: /home/${{ secrets.SSH_USER }}/pulse-messenger
  SERVICE_NAME: pulse-messenger

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server deps
        run: cd server && npm install

      - name: Install client deps and build
        run: |
          cd client
          npm install
          npm run build
        env:
          CI: false

  deploy:
    name: Deploy to VDS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build client
        run: |
          cd client
          npm install
          npm run build
        env:
          CI: false

      - name: Prepare artifacts
        run: |
          mkdir -p deploy/server
          mkdir -p deploy/client/build

          cp server/server.js deploy/server/
          cp server/package.json deploy/server/

          cp -r client/build/* deploy/client/build/

          cp nginx.conf deploy/ 2>/dev/null || true

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }}" \
            deploy/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.APP_DIR }}/

      - name: Install deps and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            APP_DIR="${{ env.APP_DIR }}"
            cd "$APP_DIR"

            echo "Installing server dependencies..."
            cd server
            npm install --production
            cd ..

            echo "Creating .env file..."
            cat > .env <<EOF
            NODE_ENV=production
            PORT=${{ secrets.APP_PORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOF

            echo "Updating systemd service..."
            sudo tee /etc/systemd/system/pulse-messenger.service > /dev/null <<EOF
            [Unit]
            Description=Pulse Messenger
            After=network.target

            [Service]
            Type=simple
            User=${{ secrets.SSH_USER }}
            WorkingDirectory=$APP_DIR/server
            EnvironmentFile=$APP_DIR/.env
            ExecStart=/usr/bin/node server.js
            Restart=on-failure
            RestartSec=5
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable pulse-messenger
            sudo systemctl restart pulse-messenger

            echo "Deploy complete!"
            sleep 2
            sudo systemctl status pulse-messenger --no-pager || true

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            sleep 3
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ secrets.APP_PORT }}/ || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Server is running! (HTTP $HTTP_CODE)"
            else
              echo "Server not responding (HTTP $HTTP_CODE)"
              sudo journalctl -u pulse-messenger -n 30 --no-pager
              exit 1
            fi

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key