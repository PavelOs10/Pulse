name: 🚀 Deploy Pulse Messenger

on:
  push:
    branches: [main]
  workflow_dispatch:  # Ручной запуск

env:
  APP_NAME: pulse-messenger
  APP_DIR: /home/${{ secrets.SSH_USER }}/pulse-messenger
  SERVICE_NAME: pulse-messenger

jobs:
  # ═══════════════════════════════════════════════
  # ─── ТЕСТЫ И ПРОВЕРКИ ─────────────────────────
  # ═══════════════════════════════════════════════
  test:
    name: 🧪 Тесты и линтинг
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Установка серверных зависимостей
        run: cd server && npm ci

      - name: Установка клиентских зависимостей
        run: cd client && npm ci

      - name: Сборка клиента
        run: cd client && npm run build
        env:
          CI: false  # Не падать на warnings

  # ═══════════════════════════════════════════════
  # ─── ДЕПЛОЙ НА VDS ────────────────────────────
  # ═══════════════════════════════════════════════
  deploy:
    name: 🚀 Деплой на VDS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Сборка клиента
        run: |
          cd client
          npm ci
          npm run build
        env:
          CI: false

      - name: 📦 Подготовка артефактов
        run: |
          # Собираем только то, что нужно для продакшена
          mkdir -p deploy/server
          mkdir -p deploy/client/build

          # Серверные файлы
          cp server/server.js deploy/server/
          cp server/package.json deploy/server/
          cp server/package-lock.json deploy/server/ 2>/dev/null || true

          # Собранный клиент
          cp -r client/build/* deploy/client/build/

          # Конфиги
          cp nginx.conf deploy/
          cp Dockerfile deploy/ 2>/dev/null || true
          cp docker-compose.yml deploy/ 2>/dev/null || true

      - name: 🔐 Настройка SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: 🔄 Синхронизация файлов на сервер
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT || 22 }}" \
            deploy/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.APP_DIR }}/

      - name: ⚙️ Установка зависимостей и перезапуск
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            APP_DIR="${{ env.APP_DIR }}"
            cd "$APP_DIR"

            echo "══════════════════════════════════════"
            echo "  📦 Установка серверных зависимостей"
            echo "══════════════════════════════════════"
            cd server
            npm ci --production
            cd ..

            echo "══════════════════════════════════════"
            echo "  📝 Создание .env файла"
            echo "══════════════════════════════════════"
            cat > .env <<'ENVEOF'
            NODE_ENV=production
            PORT=${{ secrets.APP_PORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ENVEOF

            echo "══════════════════════════════════════"
            echo "  🔄 Обновление systemd сервиса"
            echo "══════════════════════════════════════"
            sudo tee /etc/systemd/system/pulse-messenger.service > /dev/null <<EOF
            [Unit]
            Description=Pulse Messenger
            After=network.target

            [Service]
            Type=simple
            User=${{ secrets.SSH_USER }}
            WorkingDirectory=$APP_DIR/server
            EnvironmentFile=$APP_DIR/.env
            ExecStart=/usr/bin/node server.js
            Restart=on-failure
            RestartSec=5
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable pulse-messenger
            sudo systemctl restart pulse-messenger

            echo "══════════════════════════════════════"
            echo "  ✅ Деплой завершён!"
            echo "══════════════════════════════════════"
            sleep 2
            sudo systemctl status pulse-messenger --no-pager || true

      - name: 🏥 Проверка здоровья
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Ожидание запуска сервера..."
            sleep 3
            
            # Проверяем что сервер отвечает
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ secrets.APP_PORT || 3000 }}/ || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Сервер работает! (HTTP $HTTP_CODE)"
            else
              echo "❌ Сервер не отвечает (HTTP $HTTP_CODE)"
              echo "Логи:"
              sudo journalctl -u pulse-messenger -n 30 --no-pager
              exit 1
            fi

      - name: 🧹 Очистка SSH ключей
        if: always()
        run: rm -f ~/.ssh/deploy_key
